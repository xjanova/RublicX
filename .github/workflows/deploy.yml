name: Build, Release, and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compute version
        id: ver
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE_VERSION}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${BASE_VERSION}+${SHORT_SHA}"

      - name: Install
        run: npm ci || npm install

      - name: Build
        env:
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}
          VITE_BASE_PATH: /RublicX/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload build for release job
        uses: actions/upload-artifact@v4
        with:
          name: rublicx-dist
          path: dist
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: rublicx-dist
          path: dist

      - name: Zip dist
        run: |
          cd dist
          zip -r "../rublicx-${{ needs.build.outputs.version }}.zip" .

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --title "RublicX $TAG" \
            --notes "Auto-built from $(git rev-parse --short HEAD). Deployed to GitHub Pages." \
            --target "$GITHUB_SHA" \
            --latest \
            "rublicx-${VERSION}.zip" || \
          gh release upload "$TAG" "rublicx-${VERSION}.zip" --clobber
