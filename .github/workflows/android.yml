name: Build & Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'package.json'
      - '.github/workflows/android.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build, Release, and Deploy"]
    types: [completed]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Compute version
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version")
          # Monotonic versionCode = run number; ensures every build can install over the previous.
          CODE=$((${{ github.run_number }} + 100))
          NAME="${BASE}+$(git rev-parse --short HEAD)"
          echo "version_code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=v${BASE}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Built versionCode=${CODE} versionName=${NAME}"

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is not set — APK will be signed with debug key (cannot install over a signed release)."
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.keystore
          echo "$KEYSTORE_B64" | base64 -d > ~/.keystore/rublicx.keystore
          echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$HOME/.keystore/rublicx.keystore" >> "$GITHUB_OUTPUT"

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.9

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          APK_VERSION_CODE: ${{ steps.ver.outputs.version_code }}
          APK_VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          DEST="rublicx-${{ steps.ver.outputs.version_name }}.apk"
          cp "$APK" "../$DEST"
          ls -la "../$DEST"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rublicx-apk-${{ steps.ver.outputs.version_code }}
          path: ${{ steps.locate.outputs.apk }}
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          NAME: ${{ steps.ver.outputs.version_name }}
          APK: ${{ steps.locate.outputs.apk }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --title "RublicX $NAME" \
              --notes "Auto-built from $(git rev-parse --short HEAD).\\n\\n- Web bundle: deployed to https://xjanova.github.io/RublicX/\\n- Android APK: signed with stable release key — installs over previous versions.\\n- Tap any APK in this release to install or update via the in-app banner." \
              --target "$GITHUB_SHA" \
              --latest
          fi
